```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>質問サイト</title>

<style>
body{
  font-family: sans-serif;
  background:#f5f7fb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:white;
  padding:30px;
  border-radius:12px;
  width:400px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
  margin-bottom:20px;
}

button{
  display:block;
  width:100%;
  margin:8px 0;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#4f46e5;
  color:white;
  font-size:14px;
  cursor:pointer;
}

button:hover{
  background:#4338ca;
}

.nav{
  margin-top:20px;
}

.nav button{
  background:#e5e7eb;
  color:#333;
}

.nav button:hover{
  background:#d1d5db;
}
</style>
</head>

<body>

<div class="container">

<h2 id="question"></h2>

<div id="choices"></div>

<div class="nav">
<button onclick="prevQuestion()">← 前に戻る</button>
<button onclick="restart()">最初から</button>
</div>

</div>

<script>

const questions = [
{
text:"休日はどう過ごしたい？",
choices:[
"家でゆっくり",
"外で遊ぶ",
"旅行したい"
]
},
{
text:"好きな食べ物は？",
choices:[
"和食",
"洋食",
"甘いもの"
]
},
{
text:"理想のペットは？",
choices:[
"犬",
"猫",
"飼わない"
]
}
]

let current = 0
let historyStack = []

function showQuestion(){

const q = questions[current]

document.getElementById("question").innerText = q.text

const choicesDiv = document.getElementById("choices")
choicesDiv.innerHTML = ""

q.choices.forEach(choice => {

const btn = document.createElement("button")
btn.innerText = choice

btn.onclick = () => {
historyStack.push(current)
current++

if(current >= questions.length){
showResult()
}else{
showQuestion()
}

}

choicesDiv.appendChild(btn)

})

}

function prevQuestion(){

if(historyStack.length === 0) return

current = historyStack.pop()
showQuestion()

}

function restart(){

current = 0
historyStack = []
showQuestion()

}

function showResult(){

document.getElementById("question").innerText = "診断終了！"

document.getElementById("choices").innerHTML = `
<button onclick="restart()">もう一度やる</button>
`

}

showQuestion()

</script>

</body>
</html>
```
